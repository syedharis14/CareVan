services:
  postgres:
    image: postgres:16-alpine
    container_name: carevan-postgres
    environment:
      POSTGRES_USER: carevan
      POSTGRES_PASSWORD: carevan_dev
      POSTGRES_DB: carevan
    ports:
      # Host 5433: this machine also runs a system Postgres on 5432.
      - '5433:5432'
    volumes:
      - carevan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carevan -d carevan']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  carevan_pgdata:
